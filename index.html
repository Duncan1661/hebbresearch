    <!-- Navbar links -->

      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">

      <!-- Search form -->
      <form class="d-flex" role="search" onsubmit="return handleSearch(event)">
  <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" id="searchInput">
  <button class="btn btn-outline-light" type="submit">Search</button>
</form>

<!-- Optional Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const pages = {
    "home": "index.html",
    "variable inductor": "var_inductor.html",
    "variable condenser": "var_condenser.html",
    "blog": "#",
    "about us": "#",
    "contact": "#"
  };

  const searchInput = document.getElementById("searchInput");
  const suggestionList = document.getElementById("suggestionList");

  // Show suggestions as user types
  searchInput.addEventListener("input", () => {
    const query = searchInput.value.trim().toLowerCase();
    suggestionList.innerHTML = "";

    if (query === "") {
      suggestionList.style.display = "none";
      return;
    }

    const matches = Object.keys(pages).filter(page => page.includes(query));

    if (matches.length > 0) {
      matches.forEach(match => {
        const li = document.createElement("li");
        li.classList.add("list-group-item", "list-group-item-action");
        li.textContent = match;
        li.style.cursor = "pointer";
        li.onclick = () => {
          window.location.href = pages[match];
        };
        suggestionList.appendChild(li);
      });
      suggestionList.style.display = "block";
    } else {
      suggestionList.style.display = "none";
    }
  });

  // Hide suggestion box when clicking outside
  document.addEventListener("click", (e) => {
    if (!searchInput.contains(e.target) && !suggestionList.contains(e.target)) {
      suggestionList.style.display = "none";
    }
  });

  // Handle form submission (manual entry)
  function handleSearch(event) {
    event.preventDefault();
    const query = searchInput.value.trim().toLowerCase();
    const match = Object.keys(pages).find(page => page.includes(query));
    if (match) {
      window.location.href = pages[match];
    } else {
      alert("No match found.");
    }
    return false;
  }
</script>


</body>
</html>
